# render.yaml — Music AI Proxy + MCIA
# Deploy: connect repo on render.com → "New Web Service" → select this file
# Docs  : https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: sonauto-proxy-pro
    env: node
    plan: free
    branch: main
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    autoDeploy: true
    healthCheckPath: /health

    envVars:
      # ── Sonauto ──────────────────────────────────────────────────────────
      - key: EXPO_PUBLIC_SONAUTO_API_KEY
        sync: false          # set manually in Render dashboard

      # ── ACE-Step ─────────────────────────────────────────────────────────
      - key: ACESTEP_API_KEY
        sync: false
      - key: ACESTEP_BASE_URL
        sync: false          # set manually: https://api.acemusic.ai

      # ── MCIA — PythonAnywhere ─────────────────────────────────────────────
      - key: PYTHONANYWHERE_BASE_URL
        sync: false          # set manually: https://cantiques.pythonanywhere.com

      # ── MCIA — NVIDIA / Kimi (principal) ──────────────────────────────────
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_API_URL
        sync: false          # set manually: https://integrate.api.nvidia.com/v1/chat/completions

      # ── MCIA — Gemini (fallback) ───────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_URL
        sync: false          # set manually: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

      # ── Storage ───────────────────────────────────────────────────────────
      - key: AUTO_DOWNLOAD
        value: "false"
      - key: IN_MEMORY_TTL_MS
        value: "1800000"

      # ── S3 (optional) ─────────────────────────────────────────────────────
      # - key: AWS_S3_BUCKET
      #   sync: false
      # - key: AWS_ACCESS_KEY_ID
      #   sync: false
      # - key: AWS_SECRET_ACCESS_KEY
      #   sync: false
      # - key: AWS_REGION
      #   value: us-east-1

      # ── Keep-alive ────────────────────────────────────────────────────────
      - key: KEEP_ALIVE_URL
        sync: false          # set manually: https://xxx.onrender.com/health
      - key: KEEP_ALIVE_INTERVAL_MS
        value: "240000"

      # ── Optional auth ─────────────────────────────────────────────────────
      - key: CLIENT_API_KEY
        sync: false

      # ── Polling ───────────────────────────────────────────────────────────
      - key: MAX_POLL_ATTEMPTS
        value: "60"
      - key: POLL_BASE_DELAY_MS
        value: "4000"
